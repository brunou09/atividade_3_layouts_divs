<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <title>Atividade 3 - Layouts com divs</title>
</head>

<body>
    <p>Exercício 1</p>
    <div class="fundo">
        <div class="amarelo">Bloco 1</div>
        <div class="flex">
            <div>
                <div class="flex">
                    <div class="amarelo">Bloco 2</div>
                    <div class="amarelo">Bloco 3</div>
                </div>
                <div class="amarelo">Bloco 4</div>
            </div>
            <div class="amarelo">Bloco 5</div>
        </div>
    </div>

    <p>Exercício 2</p>
    <div class="fundo">
        <div class="flex">
            <div class="amarelo">Bloco 1</div>
            <div class="amarelo">Bloco 2</div>
            <div class="amarelo">Bloco 3</div>
        </div>
        <div class="amarelo">Bloco 4</div>
        <div class="flex">
            <div class="amarelo alongar">Bloco 5</div>
            <div class="amarelo">Bloco 6</div>
        </div>
    </div>

    <p>Exercício 3</p>
    <div class="fundo">
        <div class="flex">
            <div>
                <div class="amarelo esticar_mais">Bloco 1</div>
            </div>
            <div>
                <div>
                    <div class="amarelo n_esticar alongar">Bloco 2</div>
                </div>
                <div class="flex">
                    <div class="amarelo esticar_menos n_alongar">Bloco 3</div>
                    <div class="amarelo esticar_menos n_alongar">Bloco 4</div>
                </div>
            </div>
        </div>
    </div>

    <p>Exercício 4</p>
    <div class="fundo">
        <div class="flex">
            <div class="amarelo esticar_mais n_alongar">Bloco 1</div>
            <div>
                <div class="amarelo n_esticar n_alongar">Bloco 2</div>
                <div class="amarelo esticar_menos n_alongar">Bloco 3</div>
            </div>
            <div class="amarelo esticar_mais n_alongar">Bloco 4</div>
        </div>
    </div>

    <p>Exercício 5</p>
    <div class="fundo">
        <div class="flex">
            <div>
                <div class="flex">
                    <div class="amarelo">Bloco 1</div>
                    <div class="amarelo">Bloco 2</div>
                </div>
                <div class="amarelo alongar esticar_menos">Bloco 3</div>
            </div>
            <div class="amarelo esticar_mais">Bloco 4</div>
        </div>
    </div>
</body>
